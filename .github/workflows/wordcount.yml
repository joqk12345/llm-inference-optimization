name: wordcount

on:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  update-wordcounts:
    # Avoid infinite loops: the follow-up commit is made by github-actions[bot].
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate word counts
        run: python3 scripts/wordcount.py --write

      - name: Commit updates (if changed)
        run: |
          if [ -z "$(git status --porcelain docs/word-counts.md docs/word-counts.json)" ]; then
            echo "No changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/word-counts.md docs/word-counts.json
          git commit -m "chore(wordcount): update chapter word counts"
          git push

